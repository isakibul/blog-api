<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spirograph</title>
<style>
body {
margin: 0;
overflow: hidden;
background-color: black;
}
canvas {
display: block;
margin: auto;
}
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
function drawSpirograph(radius, color) {
ctx.strokeStyle = color;
ctx.beginPath();
for (let i = 0; i < 360; i++) {
const angle = i * Math.PI / 180;
const x = canvas.width / 2 + radius * Math.cos(angle * 2) * Math.cos(angle);
const y = canvas.height / 2 + radius * Math.cos(angle * 2) * Math.sin(angle);
if (i === 0) {
ctx.moveTo(x, y);
} else {
ctx.lineTo(x, y);
}
}
ctx.closePath();
ctx.stroke();
}
const colors = ["red", "blue", "green", "yellow", "purple", "orange"];
for (let i = 0; i < 6; i++) {
const color = colors[Math.floor(Math.random() * colors.length)];
const radius = Math.floor(Math.random() * 150) + 50;
drawSpirograph(radius, color);
}
</script>
</body>
</html>
